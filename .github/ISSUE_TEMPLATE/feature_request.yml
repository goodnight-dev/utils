name: Feature request
description: Suggest a new utility or an improvement
labels: ['enhancement', 'triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do? What's missing or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description:
        The API or behavior you'd like. Sketch a signature or example if you
        can.
      render: ts
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
