name: Release

on:
  push:
    branches: [main]

# changesets/action opens the "Version Packages" PR and, on merge, publishes.
# `id-token: write` is required for npm Trusted Publishing (OIDC) + provenance.
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  LEFTHOOK: '0'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # When changesets are present, opens/updates a "Version Packages" PR.
      # When that PR merges (no changesets left, versions bumped), it publishes.
      - name: Create Version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Generate npm provenance attestations on publish.
          NPM_CONFIG_PROVENANCE: 'true'
