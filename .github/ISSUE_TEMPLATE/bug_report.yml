name: Bug report
description: Report a bug in a @goodnight-dev package
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: input
    id: package
    attributes:
      label: Affected package and version
      placeholder: '@goodnight-dev/string@0.0.0'
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description:
        A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or a code snippet that reproduces the issue.
      render: ts
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: 'Node 22, pnpm 10, macOS 15'
    validations:
      required: false
